openapi: 3.1.0
info:
  title: Qpid API
  version: 0.1.0
servers:
  - url: http://localhost:8080/api
security:
  - forwardedUserAuth: []
tags:
  - name: auth
    description: Authentication and account lifecycle
  - name: me
    description: Current user profile and actions
  - name: users
    description: User lookup
  - name: suggestions
    description: Recommended users
paths:
  /signup:
    post:
      security: []
      tags:
        - auth
      summary: アカウント作成 = 同意
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: アカウント作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
  /me:
    get:
      tags:
        - me
      summary: 自分の情報取得
      operationId: getMe
      responses:
        '200':
          description: 自分のユーザー情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags:
        - me
      summary: マイプロフィール更新
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: 更新後の自分のユーザー情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/likes:
    get:
      tags:
        - me
      summary: LIKE した人を取得
      operationId: listMyLikes
      responses:
        '200':
          description: 自分がLIKEしたユーザー一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - me
      summary: LIKE (相手に通知)
      operationId: likeUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserActionRequest'
      responses:
        '204':
          description: LIKE成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /me/liked-by:
    get:
      tags:
        - me
      summary: 自分をLIKEした人を取得
      operationId: listUsersWhoLikedMe
      responses:
        '200':
          description: 自分をLIKEしたユーザー一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/nopes:
    post:
      tags:
        - me
      summary: NOPE (オススメ表示優先度を下げる)
      operationId: nopeUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserActionRequest'
      responses:
        '204':
          description: NOPE成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /me/icon:
    patch:
      tags:
        - me
      summary: 自分のアイコン画像更新
      operationId: updateMyIcon
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
          image/jpeg:
            schema:
              type: string
              format: binary
          image/webp:
            schema:
              type: string
              format: binary
      responses:
        '204':
          description: アイコン画像更新成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags:
        - me
      summary: 自分のアイコン画像削除
      operationId: deleteMyIcon
      responses:
        '204':
          description: アイコン画像削除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/{id}:
    get:
      tags:
        - users
      summary: ユーザー情報取得
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          description: ユーザーID
          schema:
            type: string
          example: tidus
      responses:
        '200':
          description: ユーザー情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{id}/icon:
    get:
      tags:
        - users
      summary: ユーザーのアイコン画像取得
      operationId: getUserIcon
      parameters:
        - name: id
          in: path
          required: true
          description: ユーザーID
          schema:
            type: string
          example: tidus
      responses:
        '200':
          description: ユーザーのアイコン画像
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /suggestions:
    get:
      tags:
        - suggestions
      summary: オススメ取得
      operationId: listSuggestions
      responses:
        '200':
          description: オススメユーザー一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Suggestion'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    forwardedUserAuth:
      type: apiKey
      in: header
      name: X-Forwarded-User
      description: 認証済みユーザー名を表すリバースプロキシ由来のヘッダー
  schemas:
    SignupRequest:
      type: object
      required:
        - agreed
      properties:
        agreed:
          type: boolean
          const: true
          description: 利用規約等への同意
      additionalProperties: false
    ProfileUpdateRequest:
      type: object
      required:
        - hasIcon
        - major
        - affiliations
        - hometown
        - tags
        - technologies
        - bio
        - favoriteTopic
        - dislikedTopic
      properties:
        hasIcon:
            type: boolean
            description: Qpidにアップロードされたアイコン画像があるかどうか
            example: true
        major:
          type:
            - string
            - 'null'
          description: 学部/系
        affiliations:
          type: array
          description: 所属班
          items:
            $ref: '#/components/schemas/UserAffiliation'
          uniqueItems: true
        hometown:
          type:
            - string
            - 'null'
          description: 出身
        tags:
          type: array
          items:
            type: string
          description: タグ
          example:
            - くねくね
            - ドパガキ
        technologies:
          type: array
          items:
            type: string
          description: 技術スタック
          example:
            - c++
            - go
        bio:
          type:
            - string
            - 'null'
          description: 自己紹介
        favoriteTopic:
          oneOf:
            - $ref: '#/components/schemas/TopicAndValue'
            - type: 'null'
        dislikedTopic:
          oneOf:
            - $ref: '#/components/schemas/TopicAndValue'
            - type: 'null'
      additionalProperties: false
    UserActionRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          description: 対象ユーザーID
          example: tidus
      additionalProperties: false
    UserSummary:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          description: ユーザーID
          example: tidus
      additionalProperties: false
    User:
      type: object
      required:
        - username
        - hasIcon
        - major
        - affiliations
        - hometown
        - tags
        - technologies
        - bio
        - favoriteTopic
        - dislikedTopic
      properties:
        username:
          type: string
          description: ユーザーID
          example: tidus
        hasIcon:
          type: boolean
          description: Qpidにアップロードされたアイコン画像があるかどうか
          example: true
        major:
          type:
            - string
            - 'null'
          description: 学部/系
          example: 工学院 経営工学系
        affiliations:
          type: array
          description: 所属班
          items:
            $ref: '#/components/schemas/UserAffiliation'
          uniqueItems: true
          example:
            - algorithm
            - ctf
            - game
            - graphics
            - kaggle
            - sound
            - sysad
        hometown:
          type:
            - string
            - 'null'
          description: 出身
          example: 鳥取県
        tags:
          type: array
          items:
            type: string
          description: タグ
          example:
            - くねくね
            - ドパガキ
        technologies:
          type: array
          items:
            type: string
          description: 技術スタック
          example:
            - c++
            - go
        bio:
          type:
            - string
            - 'null'
          description: 自己紹介
          example: ''
        favoriteTopic:
          oneOf:
            - $ref: '#/components/schemas/TopicAndValue'
            - type: 'null'
        dislikedTopic:
          oneOf:
            - $ref: '#/components/schemas/TopicAndValue'
            - type: 'null'
      additionalProperties: false
    Suggestion:
      type: object
      required:
        - username
        - similarity
      properties:
        username:
          type: string
          description: ユーザーID
          example: tidus
        similarity:
          type: number
          format: double
          description: 類似度
          minimum: 0
          maximum: 1
          example: 0.5
      additionalProperties: false
    TopicAndValue:
      type: object
      required:
        - topic
        - value
      properties:
        topic:
          type: string
          description: トピック名
          example: 言語
        value:
          type: string
          description: トピックの値
          example: C++
      additionalProperties: false
    UserAffiliation:
      type: string
      description: 所属班
      enum:
        - algorithm
        - ctf
        - game
        - graphics
        - kaggle
        - sound
        - sysad
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
      additionalProperties: false
  responses:
    BadRequest:
      description: リクエストが不正
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: 認証が必要
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: 対象が見つからない
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: リソースが競合している
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
