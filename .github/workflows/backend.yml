name: Backend

on:
  pull_request:
    paths:
      - "Qpid/**"
      - ".github/workflows/backend.yml"

jobs:
  backend:
    name: Code Quality and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Qpid

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: Qpid/go.mod
          cache-dependency-path: Qpid/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Quality check
        run: |
          go fmt ./...
          git diff --exit-code -- .

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
